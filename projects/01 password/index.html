<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
</head>
<body>



<input id="input" type="text" placeholder="password">
<button onclick="buttonClicked()">click me</button>
<span id="output">...</span>



</body>
<script src="sha1.js"></script>
<script>



async function buttonClicked() {

    const password = document.getElementById("input").value;

    const hash = sha1hex(password);

    document.getElementById("output").innerText = hash;
}



</script>
</html>
